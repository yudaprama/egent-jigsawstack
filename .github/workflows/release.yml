name: Build & Release

# Tag-triggered release (aligned with egent-public-apis). planoctl
# (ai-orchestration/main.go) downloads RAW binaries egent-jigsawstack-{os}-{arch}
# at the exact version pinned by defaultEgentJigsawstackVersion. Cut a release
# with `make tag-patch && git push --tags` (or push a v* tag). Branch pushes no
# longer auto-release — previously every push to master bumped and shipped a new
# version, which produced stray releases (v0.0.2/v0.0.3) without a matching
# main.go pin.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build all targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.0.${GITHUB_RUN_NUMBER}-$(echo "${GITHUB_SHA::7}")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Run tests
        run: make test

      - name: Build all targets (raw binaries)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: make build-all VERSION="$VERSION"

      - name: Pack source archive
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          git archive --format=tar.gz \
            --prefix="egent-jigsawstack-${VERSION}/" \
            -o "dist/egent-jigsawstack-source-${VERSION}.tar.gz" \
            HEAD
          sha256sum "dist/egent-jigsawstack-source-${VERSION}.tar.gz" \
            > "dist/egent-jigsawstack-source-${VERSION}.tar.gz.sha256"
          ls -lh dist/

      # Raw binaries (dist/egent-jigsawstack-{os}-{arch}) + their .sha256, plus the
      # source archive. planoctl downloads the raw binaries by exact name.
      - uses: actions/upload-artifact@v4
        with:
          name: egent-jigsawstack-binaries
          path: |
            dist/egent-jigsawstack-*
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (prerelease=$IS_PRERELEASE)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            dist/egent-jigsawstack-*
